<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>SoriGraph</title>
    <link rel="stylesheet" href="../node_modules/sweetalert2/dist/sweetalert2.min.css">
    <link rel="stylesheet" href="css/styles.css?v=89">
  </head>
  <body ondragover="return false" ondrop="return false">
    <div class="app-shell">
      <section id="graphPane" class="graph-pane">
        <header class="titlebar">
          <div class="brand">
            <img src="../public/logo/sori_navbar.png" alt="SoriGraph logo" class="brand-logo" draggable="false">
          </div>
          <div class="title-actions">
            <button class="icon-button" id="readBtn" title="Read selected keyframe values" type="button"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg></button>
            <button class="icon-button" id="resetBtn" title="Reset to current preset" type="button"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg></button>
          </div>
        </header>

        <div class="graph-stage" id="graphStage">
          <canvas id="ghostCanvas"></canvas>
          <canvas id="graphCanvas"></canvas>
          <button class="handle" id="handle1" type="button" aria-label="First bezier handle"></button>
          <button class="handle" id="handle2" type="button" aria-label="Second bezier handle"></button>
          <div class="snap-handle" id="snapHandle1" title="Drag to adjust timing influence"></div>
          <div class="snap-handle" id="snapHandle2" title="Drag to adjust timing influence"></div>
          <div class="snap-badge" id="snapBadge">snap</div>
        </div>

        <div class="controls-container">
          <div class="value-row">
            <button id="valueBtn" class="value-button" title="Edit bezier values" type="button">0.00, 1.00, 1.00, 0.00</button>
          </div>

          <button class="icon-button" id="flipBtn" title="Flip curve" type="button"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v14c0 1.1.9 2 2 2h3"/><path d="M16 3h3a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-3"/><path d="M12 20v2"/><path d="M12 14v2"/><path d="M12 8v2"/><path d="M12 2v2"/></svg></button>
          <button class="icon-button" id="saveBtn" title="Save as preset" type="button"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></polygon></svg></button>
        </div>
      </section>

      <div id="splitter" class="splitter" title="Drag to resize">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" stroke="none"><circle cx="9" cy="4" r="1.5"/><circle cx="15" cy="4" r="1.5"/><circle cx="9" cy="12" r="1.5"/><circle cx="15" cy="12" r="1.5"/><circle cx="9" cy="20" r="1.5"/><circle cx="15" cy="20" r="1.5"/></svg>
      </div>

      <section id="libraryPane" class="library-pane">
        <div class="library-toolbar">
          <select id="librarySelect" title="Preset library"></select>
          
          <div class="toolbar-actions">
            <!-- Library Management Actions -->
            <button class="icon-button" id="newLibraryBtn" title="Create new library" type="button"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg></button>
            <button class="icon-button" id="importBtn" title="Import library" type="button"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 22h14a2 2 0 0 0 2-2V7.5L14.5 2H6a2 2 0 0 0-2 2v4"/><polyline points="14 2 14 8 20 8"/><path d="M2 15h10"/><path d="m9 18 3-3-3-3"/></svg></button>
            <button class="icon-button" id="exportBtn" title="Export library" type="button"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 22h14a2 2 0 0 0 2-2V7.5L14.5 2H6a2 2 0 0 0-2 2v4"/><polyline points="14 2 14 8 20 8"/><path d="M2 13h10"/><path d="m5 10-3 3 3 3"/></svg></button>
            <button class="icon-button danger" id="deleteLibraryBtn" title="Delete library" type="button"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg></button>
          </div>
        </div>
        <div id="presetGrid" class="preset-grid"></div>
      </section>
      
      <footer class="bottom-bar">
        <div class="utility-actions">
          <button class="icon-button" id="copyEaseBtn" title="Copy selected keyframe ease" type="button" aria-label="Copy selected keyframe ease"></button>
          <button class="icon-button paste-ease-button" id="pasteEaseBtn" title="Paste copied ease to selected keyframes" type="button" aria-label="Paste copied ease to selected keyframes"></button>
        </div>
        
        <button class="apply-button" id="applyBtn" type="button">APPLY</button>
      </footer>
    </div>

    <input id="importFile" class="visually-hidden" type="file" accept=".sorigraph,.sori,.sori.json,.json,.flow,.txt">

    <script src="../node_modules/sweetalert2/dist/sweetalert2.all.min.js"></script>
    <script src="js/csinterface.js?v=2"></script>
    <script src="js/app.js?v=91"></script>
  </body>
</html>
